<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:composition template="template/template1.xhtml">
        <ui:define name="content">
            <div class="container py-5 h-100">
                <div class="row d-flex justify-content-center align-items-center h-100">
                    <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                        <h2>Bize Ulaşın</h2>
                        <h:form>
                            <div class="mb-3">
                                <label for="name" class="label1">İsim:</label>
                                <input type="text" class="form-control1" id="name" name="name" />
                            </div>
                            <div class="mb-3">
                                <label for="email" class="label1">Email Adresi:</label>
                                <input type="email" class="form-control1" id="email" name="email" />
                            </div>
                            <div class="mb-3">
                                <label for="message" class="label1">Mesajınız:</label>
                                <textarea class="form-control1" id="message" name="message"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary1" >Gönder</button>
                        </h:form>
                    </div>
                </div>
            </div>

            <!-- Dosya işlemleri -->
            <div class="container mt-5">
                <h2>Dosya Yükle</h2>
                <h:form enctype="multipart/form-data">
                    <div class="form-group1">
                        <label>Dosya Seç</label>
                        <h:inputFile value="#{documentBean.doc}" styleClass="custom-file1"/>
                    </div>
                    <h:commandButton action="#{documentBean.upload}" value="Yükle" styleClass="btn btn-primary1"/>
                </h:form>
                
                <hr/>
                
                <h:dataTable styleClass="table" value="#{documentBean.documentList}" var="d">
                    <h:column>
                        <f:facet name="header">ID</f:facet>
                        #{d.id}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Yol</f:facet>
                        #{d.filepath}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Ad</f:facet>
                        #{d.filename}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Tür</f:facet>
                        #{d.filetype}
                    </h:column>
                    <h:column>
                        <h:panelGroup layout="block" rendered="#{d.filetype.contains('image')}">                    
                            <h:graphicImage width="100" value="/file/#{d.filename}" />
                        </h:panelGroup>

                        <h:panelGroup layout="block" rendered="#{d.filetype.contains('application')}">                    
                            <a href="/e_coffee/index.xhtml/file/#{d.filename}" target="_blank">#{d.filename}</a>
                        </h:panelGroup>
                    </h:column>
                </h:dataTable>
            </div>
        </ui:define>
    </ui:composition>
</html>
