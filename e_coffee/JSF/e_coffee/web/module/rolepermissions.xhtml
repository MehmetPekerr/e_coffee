<!DOCTYPE html>
<ui:composition  xmlns="http://www.w3.org/1999/xhtml"
                 xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                 xmlns:h="http://xmlns.jcp.org/jsf/html"
                 xmlns:f="http://xmlns.jcp.org/jsf/core"
                 template="/template/template.xhtml">

    <ui:define name="content">
        <div class="row">
            <div class="col">
                <h:form>
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                ID
                            </tr>
                            <tr>
                                NAME
                            </tr>


                        </thead>
                        <tbody>
                            <ui:repeat value="#{rolePermissionsBean.list}" var="e">
                                <tr>

                                    <td>  #{e.permission_id.permission_name} </td>
                                    <td>  #{e.role_id.role_name} </td>

                                </tr>
                            </ui:repeat>


                        </tbody>
                    </table>
                </h:form>
            </div>

        </div>
        <div class="col">

            <h:form>
                <div class="mb-3">
                   
                    <label>Role</label>
                    <h:selectOneMenu value="#{rolePermissionsBean.entity.role_id}" converter="rolesConverter">
                        <f:selectItems value="#{rolesBean.list}" var="g" itemLabel="#{g.role_name}" itemValue="#{g}">      
                        </f:selectItems>
                    </h:selectOneMenu>
                    <br></br>
                    <br></br>
                    <label>Permissions</label>
                    <h:selectOneMenu value="#{rolePermissionsBean.entity.permission_id}" converter="permissionConverter">
                        <f:selectItems value="#{permissionsBean.list}" var="h" itemLabel="#{h.permission_name}" itemValue="#{h}">      
                        </f:selectItems>
                    </h:selectOneMenu>
                    
                </div>
                <div class="mb-3">

                    <h:commandButton styleClass="btn btn-danger"  action="#{rolePermissionsBean.create()}" value="Create"/>
                    <h:commandButton styleClass="btn btn-success"  action="#{rolePermissionsBean.clearForm}" value="Clear Form"/>
                    <h:commandButton styleClass="btn btn-danger"  action="#{rolePermissionsBean.update()}" value="Update"/>
                    <h:commandButton styleClass="btn btn-success"  action="#{rolePermissionsBean.delete()}" value="Delete"/>
                </div>
            </h:form>
        </div>
    </ui:define>


</ui:composition>
