<!DOCTYPE html>
<ui:composition  xmlns="http://www.w3.org/1999/xhtml"
                 xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                 xmlns:h="http://xmlns.jcp.org/jsf/html"
                 xmlns:f="http://xmlns.jcp.org/jsf/core"
                 template="/template/template.xhtml">

    <ui:define name="content">
        <div class="row">
            <div class="col">
                <h:form>
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                ID
                            </tr>
                            <tr>
                                Name
                            </tr>
                            <tr>
                                contact_name
                            </tr>
                            <tr>
                                email
                            </tr>
                            <tr>
                                phone_number
                            </tr>
                            <tr>
                                address
                            </tr>
                        </thead>
                        <tbody>
                            <ui:repeat value="#{suppliersBean.list}" var="e">
                                <tr>
                                    <td>  #{e.supplier_id} </td>
                                    <td> 
                                        <h:commandLink action="#{suppliersBean.setEntity(e)}" value="#{e.supplier_name}"/>
                                    </td>
                                    <td>  #{e.contact_name} </td>
                                    <td>  #{e.email} </td>
                                    <td>  #{e.phone_number} </td>
                                    <td>  #{e.address} </td>
                                </tr>
                            </ui:repeat>


                        </tbody>
                    </table>
                </h:form>
            </div>

        </div>

        <div class="col">

            <h:form>
                <div class="mb-3">
                    <label>Title</label>
                    <h:outputLabel for="supplier_name" value="supplier_name" />
                    <h:inputText id="supplier_name" value="#{suppliersBean.entity.supplier_name}" styleClass="form-control"/>

                    <label>contact_name</label>
                    <h:outputLabel for="contact_name" value="contact_name" />
                    <h:inputText id="contact_name" value="#{suppliersBean.entity.contact_name}" styleClass="form-control"/>
                    <label>email</label>
                    <h:outputLabel for="email" value="email" />
                    <h:inputText id="email" value="#{suppliersBean.entity.email}" styleClass="form-control"/>
                    <label>phone_number</label>
                    <h:outputLabel for="phone_number" value="phone_number" />
                    <h:inputText id="phone_number" value="#{suppliersBean.entity.phone_number}" styleClass="form-control"/>
                    <label>address</label>
                    <h:outputLabel for="address" value="address" />
                    <h:inputText id="address" value="#{suppliersBean.entity.address}" styleClass="form-control"/>
                </div>
                <div class="mb-3">

                    <h:commandButton styleClass="btn btn-danger" rendered="#{suppliersBean.entity.supplier_id==null}" action="#{suppliersBean.create()}" value="Create"/>
                    <h:commandButton styleClass="btn btn-success" rendered="#{suppliersBean.entity.supplier_id !=null}" action="#{suppliersBean.clearForm}" value="Clear Form"/>
                    <h:commandButton styleClass="btn btn-danger" rendered="#{suppliersBean.entity.supplier_id !=null}" action="#{suppliersBean.update()}" value="Update"/>
                    <h:commandButton styleClass="btn btn-success" rendered="#{suppliersBean.entity.supplier_id!=null}" action="#{suppliersBean.delete()}" value="Delete"/>
                </div>
            </h:form>
        </div>
    </ui:define>


</ui:composition>
