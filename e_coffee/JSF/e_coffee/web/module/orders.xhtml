<!DOCTYPE html>
<ui:composition  xmlns="http://www.w3.org/1999/xhtml"
                 xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                 xmlns:h="http://xmlns.jcp.org/jsf/html"
                 xmlns:f="http://xmlns.jcp.org/jsf/core"
                 template="/template/template.xhtml">

    <ui:define name="content">
        <div class="row">
            <div class="col">
                <h:form>
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                order_id
                            </tr>
                           
                            <tr>
                                order_date
                            </tr>
                            <tr>
                                status
                            </tr>

                        </thead>
                        <tbody>
                            <ui:repeat value="#{ordersBean.list}" var="e">
                                <tr>
                                    <td>  #{e.order_id} </td>
                                    
                                    <td>  #{e.order_date} </td>
                                    <td> 
                                        <h:commandLink action="#{ordersBean.setEntity(e)}" value="#{e.status}"/>
                                    </td>

                                </tr>
                            </ui:repeat>


                        </tbody>
                    </table>
                </h:form>
            </div>

        </div>

        <div class="col">

            <h:form>
                <div class="mb-3">

                   
                    <br></br> <br></br>
                    <label>order_date</label>
                    <h:outputLabel for="order_date" value="order_date" />
                    <h:inputText id="order_date" value="#{ordersBean.entity.order_date}" styleClass="form-control"/>
                    <br></br>


                    <br></br>
                    <label>status</label>
                    <h:outputLabel for="status" value="status" />
                    <h:inputText id="status" value="#{ordersBean.entity.status}" styleClass="form-control"/>
                    <br></br>

                </div>
                <div class="mb-3">

                    <h:commandButton styleClass="btn btn-danger" rendered="#{ordersBean.entity.order_id==null}" action="#{ordersBean.create()}" value="Create"/>
                    <h:commandButton styleClass="btn btn-success" rendered="#{ordersBean.entity.order_id !=null}" action="#{ordersBean.clearForm}" value="Clear Form"/>
                    <h:commandButton styleClass="btn btn-danger" rendered="#{ordersBean.entity.order_id !=null}" action="#{ordersBean.update()}" value="Update"/>
                    <h:commandButton styleClass="btn btn-success" rendered="#{ordersBean.entity.order_id!=null}" action="#{ordersBean.delete()}" value="Delete"/>
                </div>
            </h:form>
        </div>
    </ui:define>


</ui:composition>
