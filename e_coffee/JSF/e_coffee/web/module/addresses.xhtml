<!DOCTYPE html>
<ui:composition  xmlns="http://www.w3.org/1999/xhtml"
                 xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                 xmlns:h="http://xmlns.jcp.org/jsf/html"
                 xmlns:f="http://xmlns.jcp.org/jsf/core"
                 template="/template/template.xhtml">

    <ui:define name="content">

        <div class="row">
            <div class="col">
                <h:form>
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                ID
                            </tr>
                            <tr>
                                address_line1
                            </tr>
                             <tr>
                                address_line2
                            </tr>
                            <tr>
                                city
                            </tr>
                             <tr>
                                state
                            </tr>
                            <tr>
                                postal_code
                            </tr>
                             <tr>
                                country
                            </tr>
                        </thead>
                        <tbody>
                            


                        </tbody>
                        
                         <tbody>
                            <ui:repeat value="#{addressesBean.list2}" var="e">
                                <tr>
                                    <td>  #{e.address_id} </td>
                                    <td> 
                                        <h:commandLink action="#{addressesBean.setEntity(e)}" value="#{e.address_line1}"/>
                                    </td>
                                    <td>  #{e.address_line2} </td>
                                    <td>  #{e.city} </td>
                                    <td>  #{e.state} </td>
                                    <td>  #{e.postal_code} </td>
                                    <td>  #{e.country} </td>
                                </tr>
                            </ui:repeat>


                        </tbody>
                    </table>
                </h:form>
            </div>
             <div class="text-center">
                    <div class="d-inline-block mr-2">
                        <h:form>
                            <h:commandButton action="#{addressesBean.prev()}" value="Geri"/>
                        </h:form>
                    </div>
                    <div class="d-inline-block">
                        <h:form>
                            <h:commandButton action="#{addressesBean.next()}"  value="İleri"/>
                        </h:form>
                    </div>
                </div>

        </div>

        <div class="col">

            <h:form>
                <div class="mb-3">
                    <label>address_line1</label>
                    <h:outputLabel for="address_line1" value="address_line1" />
                    <h:inputText id="address_line1" value="#{addressesBean.entity.address_line1}" styleClass="form-control"/>
                    <br></br>
                    <label>address_line2</label>
                    <h:outputLabel for="address_line2" value="address_line2" />
                    <h:inputText id="address_line2" value="#{addressesBean.entity.address_line2}" styleClass="form-control"/>
                    <br></br>
                    <label>city</label>
                    <h:outputLabel for="city" value="city" />
                    <h:inputText id="city" value="#{addressesBean.entity.city}" styleClass="form-control"/>
                    <br></br>
                    <label>state</label>
                    <h:outputLabel for="state" value="state" />
                    <h:inputText id="state" value="#{addressesBean.entity.state}" styleClass="form-control"/>
                    <br></br>
                    <label>postal_code</label>
                    <h:outputLabel for="postal_code" value="postal_code" />
                    <h:inputText id="postal_code" value="#{addressesBean.entity.postal_code}" styleClass="form-control"/>
                    <br></br>
                    <label>country</label>
                    <h:outputLabel for="country" value="country" />
                    <h:inputText id="country" value="#{addressesBean.entity.country}" styleClass="form-control"/>
                </div>
                <div class="mb-3">

                    <h:commandButton styleClass="btn btn-danger" rendered="#{addressesBean.entity.address_id==null}" action="#{addressesBean.create()}" value="Create"/>
                    <h:commandButton styleClass="btn btn-success" rendered="#{addressesBean.entity.address_id !=null}" action="#{addressesBean.clearForm}" value="Clear Form"/>
                    <h:commandButton styleClass="btn btn-danger" rendered="#{addressesBean.entity.address_id !=null}" action="#{addressesBean.update()}" value="Update"/>
                    <h:commandButton styleClass="btn btn-success" rendered="#{addressesBean.entity.address_id!=null}" action="#{addressesBean.delete()}" value="Delete"/>
                </div>
            </h:form>
        </div>
    </ui:define>


</ui:composition>
