<!DOCTYPE html>
<ui:composition  xmlns="http://www.w3.org/1999/xhtml"
                 xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                 xmlns:h="http://xmlns.jcp.org/jsf/html"
                 xmlns:f="http://xmlns.jcp.org/jsf/core"
                 template="/template/template.xhtml">

    <ui:define name="content">

        <div class="row">
            <div class="col">
                <h:form>
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                ID
                            </tr>
                            <tr>
                                TITLE
                            </tr>
                        </thead>
                        <tbody>
                            <ui:repeat value="#{rolesBean.list}" var="e">
                                <tr>
                                    <td>  #{e.role_id} </td>
                                    <td> 
                                        <h:commandLink action="#{rolesBean.setEntity(e)}" value="#{e.role_name}"/>
                                    </td>
                                </tr>
                            </ui:repeat>


                        </tbody>
                    </table>
                </h:form>
            </div>

        </div>

        <div class="col">

            <h:form>
                <div class="mb-3">
                    <label>Title</label>
                    <h:outputLabel for="role_name" value="role_name" />
                    <h:inputText id="role_name" value="#{rolesBean.entity.role_name}" styleClass="form-control"/>
                </div>
                <div class="mb-3">

                    <h:commandButton styleClass="btn btn-danger" rendered="#{rolesBean.entity.role_id==null}" action="#{rolesBean.create()}" value="Create"/>
                    <h:commandButton styleClass="btn btn-success" rendered="#{rolesBean.entity.role_id !=null}" action="#{rolesBean.clearForm}" value="Clear Form"/>
                    <h:commandButton styleClass="btn btn-danger" rendered="#{rolesBean.entity.role_id !=null}" action="#{rolesBean.update()}" value="Update"/>
                    <h:commandButton styleClass="btn btn-success" rendered="#{rolesBean.entity.role_id!=null}" action="#{rolesBean.delete()}" value="Delete"/>
                </div>
            </h:form>
        </div>
   </ui:define>


</ui:composition>
