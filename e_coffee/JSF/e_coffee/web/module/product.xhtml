<!DOCTYPE html>
<ui:composition  xmlns="http://www.w3.org/1999/xhtml"
                 xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                 xmlns:h="http://xmlns.jcp.org/jsf/html"
                 xmlns:f="http://xmlns.jcp.org/jsf/core"
                 template="/template/template.xhtml">

    <ui:define name="content">
        <div class="row">
            <div class="col">
                <h:form>
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                ID
                            </tr>
                            <tr>
                                NAME
                            </tr>
                            <tr>
                                CATEGORY ID
                            </tr>
                            <tr>
                                SUPPLIER ID
                            </tr>
                            <tr>
                                PRICE
                            </tr>
                            <tr>
                                STOCK
                            </tr>
                            <tr>
                                DESC
                            </tr>
                        </thead>
                        <tbody>
                            <ui:repeat value="#{productBean.list}" var="e">
                                <tr>
                                    <td>  #{e.product_id} </td>
                                    <td> 
                                        <h:commandLink action="#{productBean.setEntity(e)}" value="#{e.product_name}"/>
                                    </td>
                                    <td>  #{e.category_id.category_name} </td>
                                    <td>  #{e.supplier_id.supplier_name} </td>
                                    <td>  #{e.price} </td>
                                    <td>  #{e.stock_quantity} </td>
                                    <td>  #{e.description} </td>
                                </tr>
                            </ui:repeat>


                        </tbody>
                    </table>
                </h:form>
            </div>

        </div>

        <div class="col">

            <h:form>
                <div class="mb-3">
                    <label>NAME</label>
                    <h:outputLabel for="product_name" value="product_name" />
                    <h:inputText id="category_name" value="#{productBean.entity.product_name}" styleClass="form-control"/>
                    <br></br>
                    <label>CATEGORY</label>
                    <h:selectOneMenu value="#{productBean.entity.category_id}" converter="categoryConverter">
                        <f:selectItems value="#{productCategoriesBean.list}" var="g" itemLabel="#{g.category_name}" itemValue="#{g}">      
                        </f:selectItems>
                    </h:selectOneMenu>
                    <br></br>
                    <br></br>
                    <label>SUPPLIER</label>
                    <h:selectOneMenu value="#{productBean.entity.supplier_id}" converter="suppliersConverter">
                        <f:selectItems value="#{suppliersBean.list}" var="h" itemLabel="#{h.supplier_name}" itemValue="#{h}">      
                        </f:selectItems>
                    </h:selectOneMenu>
                    <br></br>
                    <br></br>
                    <label>PRICE</label>
                    <h:outputLabel for="price" value="price" />
                    <h:inputText id="price" value="#{productBean.entity.price}" styleClass="form-control"/>
                    <br></br>
                    <label>STOCK</label>
                    <h:outputLabel for="stock_quantity" value="stock_quantity" />
                    <h:inputText id="stock_quantity" value="#{productBean.entity.stock_quantity}" styleClass="form-control"/>
                    <br></br>
                    <label>DESC</label>
                    <h:outputLabel for="description" value="description" />
                    <h:inputText id="description" value="#{productBean.entity.description}" styleClass="form-control"/>
                </div>
                <div class="mb-3">

                    <h:commandButton styleClass="btn btn-danger" rendered="#{productBean.entity.product_id==null}" action="#{productBean.create()}" value="Create"/>
                    <h:commandButton styleClass="btn btn-success" rendered="#{productBean.entity.product_id !=null}" action="#{productBean.clearForm}" value="Clear Form"/>
                    <h:commandButton styleClass="btn btn-danger" rendered="#{productBean.entity.product_id !=null}" action="#{productBean.update()}" value="Update"/>
                    <h:commandButton styleClass="btn btn-success" rendered="#{productBean.entity.product_id!=null}" action="#{productBean.delete()}" value="Delete"/>
                </div>
            </h:form>
        </div>
    </ui:define>


</ui:composition>
